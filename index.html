<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />

</head>

<body>
    <!--header -->
    <div class="header">
      <!--left side  -->
      <a href="#" class="logo"> BABYVILLE</a>
      <!-- right side -->
      <ul class="menu">
        <li><a href="">CORNERS</a></li>
        <li><a href="">FAMILIES</a></li>
        <li><a href="">VISIT</a></li>
      </ul>
    </div>
    <!-- Hero section -->
    <div class="hero">
      <!-- body -->
      <div class="hero-body">
        <div class="first-note"></div>
        <img 
        class="mascot"
        src="/Assets/mascot.png" 
        alt="Mascot" />
        <h1 class="brandname">Babyville</h1>
        <p class="subtitle">
        A bright city for naps, play, stories, snacks, and gentle care.
        </p>
      </div>
    </div>
    <div class="features">
        <h2 class="features-title">BABYVILLE CORNERS</h2>
        <p class="features-subtitle"> Sweet six places to explore.</p>
      </div>
      <!-- advert-section -->
       <section class="advert">
       <div class="first-left-picture">
       <!-- image -->
       <div class="advert-image-container">
          <img
          class="advert-image"
          src="/Assets/nap-room.png"
          alt="Nap Room" />
       </div>
       <!-- picture 2 -->
      <div class="content-with-middle-first-image">
        <!-- image -->
        <div class="middle-first-image-container">
          <img
            class="middle-first-image"
            src="/Assets/play-corner.png"
            alt="Play Corner"
          />
        </div>
         <!-- picture-3 -->
      <div class="first-right-image">
        <!-- image -->
        <div class="conference-image-container">
          <img
            class="conference-image"
            src="/Assets/snack-time.png"
            alt="Snack Time"
          />
        </div>
        <!-- content 4 -->
      <div class="second-left-image">
        <!-- image -->
        <div class="second-left-image-container">
          <img
            class="second-left-image"
            src="/Assets/story-time.png"
            alt="Group Activity"
          />
        </div>
        <!-- content 5 -->
        <div class="second-middle-image">
          <!-- image -->
          <div class="second-middle-image-container">
            <img
              class="second-middle-image"
              src="/Assets/baby-care.png"
              alt="Baby Care"
            />
          </div>
        </div>
        
</body>
</html>
